name: StatGen Radar

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Report mode
        required: true
        default: daily
        type: choice
        options: [daily, weekly]
      days:
        description: Lookback days
        required: true
        default: "1"
  push:
    branches: [main]
    paths-ignore:
      - "reports/**"
      - "data/**"
  schedule:
    - cron: "0 0 * * *"
    - cron: "15 0 * * 1"

permissions:
  contents: write

concurrency:
  group: statgen-radar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Resolve run mode
        id: config
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "days=${{ inputs.days }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "15 0 * * 1" ]]; then
            echo "mode=weekly" >> "$GITHUB_OUTPUT"
            echo "days=7" >> "$GITHUB_OUTPUT"
          else
            echo "mode=daily" >> "$GITHUB_OUTPUT"
            echo "days=1" >> "$GITHUB_OUTPUT"
          fi
      - name: Run radar
        run: python run_ranked_with_tsv.py --mode "${{ steps.config.outputs.mode }}" --days "${{ steps.config.outputs.days }}"
      - name: Commit reports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports data/literature.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update literature brief"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push attempt $attempt failed; rebasing onto latest origin/main"
            git fetch origin main
            git rebase origin/main
          done

          echo "Failed to push report after 3 attempts"
          exit 1
