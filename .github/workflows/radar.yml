name: StatGen Radar

on:
  push:
    branches: [feat/initial-pipeline]
  workflow_dispatch:
    inputs:
      mode:
        description: Report mode
        required: true
        default: daily
        type: choice
        options: [daily, weekly]
      days:
        description: Lookback days
        required: true
        default: "1"
  schedule:
    - cron: "0 0 * * *"
    - cron: "15 0 * * 1"

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    env:
      MAILJET_API_KEY: ${{ secrets.MAILJET_API_KEY }}
      MAILJET_SECRET_KEY: ${{ secrets.MAILJET_SECRET_KEY }}
      MAIL_TO: Jasperoa@outlook.com
      MAIL_FROM: Jasperoa@outlook.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Resolve run mode
        id: config
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "days=${{ inputs.days }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "15 0 * * 1" ]]; then
            echo "mode=weekly" >> "$GITHUB_OUTPUT"
            echo "days=7" >> "$GITHUB_OUTPUT"
          else
            echo "mode=daily" >> "$GITHUB_OUTPUT"
            echo "days=1" >> "$GITHUB_OUTPUT"
          fi
      - name: Run radar
        run: python statgen_radar.py --mode "${{ steps.config.outputs.mode }}" --days "${{ steps.config.outputs.days }}"
      - name: Resolve report path
        shell: bash
        run: |
          REPORT_PATH="reports/${{ steps.config.outputs.mode }}/$(date -u +%F).md"
          echo "REPORT_PATH=$REPORT_PATH" >> "$GITHUB_ENV"
          echo "REPORT_DATE=$(date -u +%F)" >> "$GITHUB_ENV"
      - name: Send brief through Mailjet
        if: ${{ env.MAILJET_API_KEY != '' && env.MAILJET_SECRET_KEY != '' }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import requests

          report_path = Path(os.environ["REPORT_PATH"])
          body = report_path.read_text(encoding="utf-8")
          payload = {
              "Messages": [{
                  "From": {"Email": os.environ["MAIL_FROM"], "Name": "StatGen Radar"},
                  "To": [{"Email": os.environ["MAIL_TO"], "Name": "Song Jie"}],
                  "Subject": f"StatGen Radar — daily brief — {os.environ['REPORT_DATE']}",
                  "TextPart": body,
              }]
          }
          response = requests.post(
              "https://api.mailjet.com/v3.1/send",
              auth=(os.environ["MAILJET_API_KEY"], os.environ["MAILJET_SECRET_KEY"]),
              json=payload,
              timeout=45,
          )
          print(response.status_code)
          print(response.text)
          response.raise_for_status()
          PY
      - name: Email configuration notice
        if: ${{ env.MAILJET_API_KEY == '' || env.MAILJET_SECRET_KEY == '' }}
        run: echo "Email skipped. Add MAILJET_API_KEY and MAILJET_SECRET_KEY as repository secrets."
      - name: Commit reports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports data/literature.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update literature brief"
            git push
          fi
