name: StatGen Radar

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Report mode
        required: true
        default: daily
        type: choice
        options: [daily, weekly]
      days:
        description: Lookback days
        required: true
        default: "1"
  schedule:
    - cron: "0 0 * * *"
    - cron: "15 0 * * 1"

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    env:
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Resolve run mode
        id: config
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "days=${{ inputs.days }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "15 0 * * 1" ]]; then
            echo "mode=weekly" >> "$GITHUB_OUTPUT"
            echo "days=7" >> "$GITHUB_OUTPUT"
          else
            echo "mode=daily" >> "$GITHUB_OUTPUT"
            echo "days=1" >> "$GITHUB_OUTPUT"
          fi
      - name: Run radar
        run: python statgen_radar.py --mode "${{ steps.config.outputs.mode }}" --days "${{ steps.config.outputs.days }}"
      - name: Resolve report path
        shell: bash
        run: |
          REPORT_PATH="reports/${{ steps.config.outputs.mode }}/$(date -u +%F).md"
          echo "REPORT_PATH=$REPORT_PATH" >> "$GITHUB_ENV"
          echo "REPORT_DATE=$(date -u +%F)" >> "$GITHUB_ENV"
      - name: Send brief by email
        if: ${{ env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-mail.outlook.com
          server_port: 587
          secure: false
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "StatGen Radar — ${{ steps.config.outputs.mode }} brief — ${{ env.REPORT_DATE }}"
          to: Jasperoa@outlook.com
          from: "StatGen Radar <${{ env.SMTP_USERNAME }}>"
          body: file://${{ env.REPORT_PATH }}
          attachments: ${{ env.REPORT_PATH }}
      - name: Email configuration notice
        if: ${{ env.SMTP_USERNAME == '' || env.SMTP_PASSWORD == '' }}
        run: echo "Email skipped. Add SMTP_USERNAME and SMTP_PASSWORD as repository secrets."
      - name: Commit reports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports data/literature.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update literature brief"
            git push
          fi
