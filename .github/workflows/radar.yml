name: StatGen Radar

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Report mode
        required: true
        default: daily
        type: choice
        options: [daily, weekly]
      days:
        description: Lookback days
        required: true
        default: "1"
  schedule:
    - cron: "0 0 * * *"
    - cron: "15 0 * * 1"

permissions:
  contents: write

concurrency:
  group: statgen-radar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    env:
      MAILJET_API_KEY: ${{ secrets.MAILJET_API_KEY }}
      MAILJET_SECRET_KEY: ${{ secrets.MAILJET_SECRET_KEY }}
      MAIL_FROM: Jasperoa@outlook.com
      MAIL_TO: Jasperoa@outlook.com
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Resolve run mode
        id: config
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "days=${{ inputs.days }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "15 0 * * 1" ]]; then
            echo "mode=weekly" >> "$GITHUB_OUTPUT"
            echo "days=7" >> "$GITHUB_OUTPUT"
          else
            echo "mode=daily" >> "$GITHUB_OUTPUT"
            echo "days=1" >> "$GITHUB_OUTPUT"
          fi
      - name: Run radar
        run: python statgen_radar.py --mode "${{ steps.config.outputs.mode }}" --days "${{ steps.config.outputs.days }}"
      - name: Resolve report metadata
        shell: bash
        run: |
          REPORT_DATE="$(date -u +%F)"
          REPORT_PATH="reports/${{ steps.config.outputs.mode }}/$REPORT_DATE.md"
          echo "REPORT_DATE=$REPORT_DATE" >> "$GITHUB_ENV"
          echo "REPORT_PATH=$REPORT_PATH" >> "$GITHUB_ENV"
      - name: Send brief through Mailjet
        shell: bash
        run: |
          python - <<'PY'
          import html
          import os
          from pathlib import Path
          import requests

          required = ["MAILJET_API_KEY", "MAILJET_SECRET_KEY", "MAIL_FROM", "MAIL_TO", "REPORT_PATH", "REPORT_DATE"]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise RuntimeError(f"Missing required configuration: {', '.join(missing)}")

          report = Path(os.environ["REPORT_PATH"]).read_text(encoding="utf-8")
          payload = {
              "Messages": [{
                  "From": {"Email": os.environ["MAIL_FROM"], "Name": "StatGen Radar"},
                  "To": [{"Email": os.environ["MAIL_TO"], "Name": "Song Jie"}],
                  "Subject": f"StatGen Radar — Daily Brief — {os.environ['REPORT_DATE']}",
                  "TextPart": report,
                  "HTMLPart": f"<pre style='white-space:pre-wrap;font-family:Arial,sans-serif'>{html.escape(report)}</pre>",
              }]
          }
          response = requests.post(
              "https://api.mailjet.com/v3.1/send",
              auth=(os.environ["MAILJET_API_KEY"], os.environ["MAILJET_SECRET_KEY"]),
              json=payload,
              timeout=60,
          )
          print("Mailjet status:", response.status_code)
          print(response.text)
          response.raise_for_status()
          PY
      - name: Commit reports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports data/literature.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update literature brief"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt $attempt failed; rebasing onto latest origin/main"
            git fetch origin main
            git rebase origin/main
          done
          echo "Failed to push report after 3 attempts"
          exit 1
