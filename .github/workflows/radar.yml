name: StatGen Radar Retrospective 2026-07-15

on:
  push:
    branches: [main]
    paths:
      - "scripts/retro_2026_07_15.py"
      - ".github/workflows/radar.yml"

permissions:
  contents: write

jobs:
  retrospective:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run modified Radar for 2026-07-15
        run: python scripts/retro_2026_07_15.py
      - name: Commit retrospective report only
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/retrospective/2026-07-15.md
          if git diff --cached --quiet; then
            echo "No report generated"
            exit 1
          fi
          git commit -m "report: retrospective StatGen Radar for 2026-07-15"
          git push origin HEAD:main
