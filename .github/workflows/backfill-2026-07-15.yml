name: Backfill StatGen Radar 2026-07-15

on:
  push:
    paths:
      - '.github/workflows/backfill-2026-07-15.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Freeze radar clock at 2026-07-15
        run: |
          python - <<'PY'
          from pathlib import Path
          src = Path('statgen_radar.py').read_text(encoding='utf-8')
          src = src.replace('datetime.now(timezone.utc)', "datetime(2026, 7, 15, 23, 59, tzinfo=timezone.utc)")
          Path('/tmp/statgen_radar_backfill.py').write_text(src, encoding='utf-8')
          PY
      - name: Run backfill
        run: python /tmp/statgen_radar_backfill.py --days 1 --mode daily
      - name: Commit backfilled report
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add reports/daily/2026-07-15.md data/literature.db
          git diff --cached --quiet || git commit -m 'Backfill StatGen Radar for 2026-07-15'
          git push
